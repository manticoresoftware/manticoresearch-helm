name: k3s Testing
on:
  pull_request:
    branches: [ master ]

jobs:
  build-balancer:
    concurrency:
      group: "build-balancer-${{ github.event.number }}"
      cancel-in-progress: true
    runs-on: [ubuntu-latest]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get changed files
        id: changed-files
        uses: actions/github-script@v6
        with:
          script: |
            const response = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const files = response.data.map(file => file.filename);
            const testOnly = files.length > 0 && files.every(file => file.startsWith('clt_tests/'));
            core.setOutput('test-only', testOnly);

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push balancer
        uses: docker/build-push-action@v6
        if: steps.changed-files.outputs.test-only != 'true'
        with:
          context: ./sources/manticore-balancer
          platforms: linux/amd64
          push: true
          tags: manticoresearch/helm-balancer:0.0.0-unstable
          cache-from: type=registry,ref=manticoresearch/helm-balancer:cache
          cache-to: type=inline
          provenance: false

  build-worker:
    concurrency:
      group: "build-worker-${{ github.event.number }}"
      cancel-in-progress: true
    runs-on: [ubuntu-latest]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get changed files
        id: changed-files
        uses: actions/github-script@v6
        with:
          script: |
            const response = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const files = response.data.map(file => file.filename);
            const testOnly = files.length > 0 && files.every(file => file.startsWith('clt_tests/'));
            core.setOutput('test-only', testOnly);

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push worker
        uses: docker/build-push-action@v6
        if: steps.changed-files.outputs.test-only != 'true'
        with:
          context: ./sources/manticore-worker
          platforms: linux/amd64
          push: true
          tags: manticoresearch/helm-worker:0.0.0-unstable
          cache-from: type=registry,ref=manticoresearch/helm-worker:cache
          cache-to: type=inline
          provenance: false

  discover:
    needs: [build-balancer, build-worker]
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - id: build
        name: Build matrix
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import pathlib

          root = pathlib.Path("clt_tests/tests")
          # Discover only top-level scenario recordings. init/*.recb files are helpers.
          tests = [
              str(path.with_suffix(""))
              for path in sorted(root.glob("*.rec"))
          ]

          if not tests:
              matrix = {"test": []}
          else:
              matrix = {
                  "test": [
                      {
                          "id": index,
                          "test_prefix": test,
                      }
                      for index, test in enumerate(tests)
                  ]
              }

          print(f"Found {len(tests)} .rec tests")
          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as fh:
              fh.write(f"matrix={json.dumps(matrix)}\n")
          PY

  tests:
    needs: [discover]
    concurrency:
      group: "tests-${{ github.event.number }}-${{ matrix.test.id }}"
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: debianmaster/actions-k3s@master
        id: k3s
        with:
          version: 'latest'

      - name: Wait for k3s to be ready
        run: |
          echo "Waiting for k3s to be ready"
          until kubectl get nodes --kubeconfig ${{ steps.k3s.outputs.kubeconfig }} | grep -q " Ready "; do
            echo "Waiting..."
            sleep 2
          done
          echo "k3s is ready"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: manticoresoftware/clt@0.7.8
        with:
          image: manticoresearch/helm-test-kit:0.0.1
          test_prefix: ${{ matrix.test.test_prefix }}
          run_args: -e TELEMETRY=0 --net=host -v ${{ steps.k3s.outputs.kubeconfig }}:${{ steps.k3s.outputs.kubeconfig }} -v $(pwd)/charts/:/.clt/charts/
